services:
  - type: web
    name: household-replenishment-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: APP_NAME
        value: 家庭 AI 补货助手
      - key: TIMEZONE
        value: America/Los_Angeles
      - key: RETAIL_SEARCH_MODE
        value: search_urls
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: HSA_SHEET_NAME
        value: HSA 候选记录
      - key: HSA_KEYWORDS
        value: hsa,fsa,hydrocortisone,anti-itch,first aid,bandage,medicine,medical,sunscreen,spf,thermometer,covid,allergy,ibuprofen,acetaminophen,pain relief,antacid,contact lens,saline,eczema
      - key: MAX_ORDER_EMAILS
        value: 10
      - key: DEFAULT_SHIPPING_ADDRESS
        value: 102 Montelena Ct
      - key: ORDER_EMAIL_QUERY
        value: (subject:"order received" OR subject:"order confirmation" OR subject:"your order" OR subject:ordered) -subject:shipped -subject:delivered -category:promotions newer_than:14d
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_JSON
        sync: false
      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: DAILY_SUMMARY_TO_EMAIL
        sync: false
      - key: HSA_SHEET_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
